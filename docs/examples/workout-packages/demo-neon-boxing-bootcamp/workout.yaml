# This schema id tells loaders that this file is the package root plus workout set plan record.
schemaId: aerobeat.workout-package.v1

# This is the contract version for the workout-package record shape.
schemaVersion: 1

# Increment this when the authored workout record changes within the same schema.
recordVersion: 1

# This package's stable workout/package identity.
workoutId: ab-workout-demo-neon-boxing-bootcamp

# Human-readable workout name shown in tools and review surfaces.
workoutName: Neon Boxing Bootcamp

# Plain-language summary of the workout's purpose and feel.
description: >-
  A docs-friendly two-song boxing workout package that demonstrates the current
  AeroBeat v1 package contract with matching ids and commented YAML.

# Semantic version for the package payload itself.
packageVersion: 1.0.0

# Tool metadata helps future migrations and debugging.
createdByTool: aerobeat-tool-content-authoring
createdByToolVersion: 0.1.0
createdAt: 2026-04-25T22:00:00Z
updatedAt: 2026-04-26T09:00:00Z

# Optional author metadata is fine here because it is traceability, not discovery state.
authorId: ab-author-docs-team
authorName: AeroBeat Docs Team

# Every package has one coaching domain file, and this points at its id.
coachConfigId: ab-coach-config-neon-bootcamp

# Preview media helps local tools show a card for this workout.
preview:
  # Package-local artwork path for the main card image.
  coverArtPath: media/art/neon-boxing-bootcamp-cover.png

# sets owns the authored sequence of playable workout slices.
# AeroBeat owns one fixed between-set runtime/UI flow, so packages do not author
# transition behavior here.
sets:
  # Each set resolves exact chart/routine/song ids rather than loose difficulty lookups.
  - setId: ab-set-neon-stride-opening-round
    chartId: ab-chart-neon-stride-boxing-medium
    routineId: ab-routine-neon-stride-boxing
    songId: ab-song-neon-stride
    environmentId: ab-environment-neon-rooftop

    # assetSelections is only for gameplay-facing asset types.
    # v1 allowed keys here are: gloves, targets, obstacles, trails.
    assetSelections:
      gloves: ab-asset-gloves-neon-pulse
      targets: ab-asset-targets-holo-rings
      obstacles: ab-asset-obstacles-light-walls
      trails: ab-asset-trails-comet-streak

  - setId: ab-set-midnight-sprint-finish-round
    chartId: ab-chart-midnight-sprint-boxing-hard
    routineId: ab-routine-midnight-sprint-boxing
    songId: ab-song-midnight-sprint
    environmentId: ab-environment-sunrise-studio

    # Reusing the same asset ids across sets is valid.
    # Runtime may still unload/reload between sets even when ids repeat.
    assetSelections:
      gloves: ab-asset-gloves-neon-pulse
      targets: ab-asset-targets-holo-rings
      obstacles: ab-asset-obstacles-light-walls
      trails: ab-asset-trails-comet-streak
