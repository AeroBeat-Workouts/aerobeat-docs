# - motion-derived arrow direction checks
# - bomb hazards in wrist space
# - obstacle windows in nose space
# - guidance-only arcs/sliders
# - higher-level burst objects where needed
# The final general-purpose YAML encoding for ordinary Flow notes/objects is
# still being rewritten, so this docs package no longer teaches the older
# portal-based schema as canonical truth.
