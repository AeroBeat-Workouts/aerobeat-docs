# A chart is one exact playable difficulty slice.
schemaId: aerobeat.chart.boxing.v1
schemaVersion: 1
recordVersion: 1
createdByTool: aerobeat-tool-content-authoring
createdByToolVersion: 0.1.0
createdAt: 2026-04-25T22:00:00Z
updatedAt: 2026-04-27T13:00:00Z

# Chart identity must be unique within the package.
chartId: ab-chart-neon-stride-boxing-medium
chartName: Neon Stride Medium Boxing

# Charts stand alone as reusable playable slices.
# They do not point back to songs or outward to sets.
mode: boxing

# Difficulty belongs on the chart, not on the set.
difficulty: medium

# interactionFamily targets movement semantics rather than a specific hardware device.
interactionFamily: gesture_2d

# supportedInputProfiles lists intended compatibility targets.
supportedInputProfiles:
  - mediapipe_camera
  - keyboard_debug

# validatedInputProfiles lists the profiles the team has actually tested.
validatedInputProfiles:
  - mediapipe_camera

# Timing and presentation hints shape playback without redefining global engine rules.
timing:
  resolution: 16
presentationHints:
  preferredViews:
    - portal
    - track
scoringHints:
  comboModel: standard

# events is mode-specific payload data.
# Boxing examples use the stronger structured payload fields instead of eventType/laneHint shorthand.
events:
  - beat: 8
    type: strike
    hand: left
    strike: jab
    zone: left_high
    portal: center
  - beat: 12
    type: strike
    hand: right
    strike: jab
    zone: right_high
    portal: center
  - beat: 16
    type: guard
    zone: center
    portal: center
    holdMs: 500
