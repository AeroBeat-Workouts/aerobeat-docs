# A routine is one song interpreted through one gameplay mode.
schemaId: aerobeat.routine.v1
schemaVersion: 1
recordVersion: 1

# This routine id is referenced by the chart and by workout entries.
routineId: ab-routine-neon-stride-boxing
routineName: Neon Stride Boxing Routine

# The routine points back to exactly one song.
songId: ab-song-neon-stride

# Mode belongs on the routine because this is the song's boxing interpretation.
mode: boxing

authorId: ab-author-docs-team
authorName: AeroBeat Docs Team

# chartIds advertises which exact chart records this routine owns.
chartIds:
  - ab-chart-neon-stride-boxing-medium

tags:
  - beginner-friendly
  - cardio-boxing
