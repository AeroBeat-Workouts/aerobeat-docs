# Harder follow-up chart for the second workout set.
schemaId: aerobeat.chart.boxing.v1
schemaVersion: 1
recordVersion: 1
createdByTool: aerobeat-tool-content-authoring
createdByToolVersion: 0.1.0
createdAt: 2026-04-25T22:00:00Z
updatedAt: 2026-04-27T13:00:00Z

# Chart identity is what the set selects directly.
chartId: ab-chart-midnight-sprint-boxing-hard
chartName: Midnight Sprint Hard Boxing

# Charts stand alone as reusable playable slices.
# They do not point back to songs or outward to sets.
mode: boxing

# Difficulty is part of the exact playable chart slice.
difficulty: hard

# The chart targets movement semantics, not a raw device.
interactionFamily: gesture_2d

# These profiles are intended to work with this chart.
supportedInputProfiles:
  - mediapipe_camera
  - keyboard_debug

# These are the profiles actually validated so far.
validatedInputProfiles:
  - mediapipe_camera

# Timing and presentation hints shape playback expectations.
timing:
  resolution: 16
presentationHints:
  preferredViews:
    - portal
scoringHints:
  comboModel: standard

# Short sample event list for readability.
# Boxing examples use the stronger structured payload fields instead of eventType/laneHint shorthand.
events:
  - beat: 6
    type: strike
    hand: left
    strike: jab
    zone: left_high
    portal: center
  - beat: 8
    type: strike
    hand: right
    strike: jab
    zone: right_high
    portal: center
  - beat: 10
    type: obstacle
    avoid: squat
    shape: bar_horizontal
    portal: center
    durationMs: 500
  - beat: 14
    type: strike
    hand: left
    strike: hook
    zone: left_high
    portal: center
