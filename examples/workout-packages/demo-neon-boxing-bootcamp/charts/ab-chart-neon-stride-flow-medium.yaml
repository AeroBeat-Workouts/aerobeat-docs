# Chart identity must still be unique within the package.
chartId: ab-chart-neon-stride-flow-medium
chartName: Neon Stride Medium Flow

# Flow charts declare the feature directly.
feature: flow

# Difficulty belongs on the chart, not on the set.
difficulty: medium

# Flow beats stay flat and sight-readable.
# start/end are beat-domain floats, end is inclusive when present,
# portal is the presentation origin, placement is where the beat passes,
# and direction is follow-through guidance for supported beat families.
